<html lang="zh-CN">

<meta charset="UTF-8">

<style>

  .filter-btn{height:30px;padding:0 12px;border:1px solid #d1d1d6;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;color:#444;display:flex;align-items:center;gap:4px;user-select:none;font-family:inherit;transition:all 0.12s}
  .filter-btn:hover{border-color:#a0a0a4;background:#f5f5f5}
  .filter-btn.active{border-color:#005fb8;color:#005fb8;background:#e5f0fa}
  .filter-btn .arrow{font-size:9px}

  .filter-dd-item{display:flex;align-items:center;padding:6px 14px;font-size:13px;color:#333;cursor:pointer;user-select:none;gap:8px}
  .filter-dd-item:hover{background:#e5f0fa;color:#005fb8}

  .page-num{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:28px;border:1px solid #d1d1d6;border-radius:5px;font-size:12px;color:#555;cursor:pointer;background:#fff;user-select:none}

  .page-num.active{background:#005fb8;color:#fff;border-color:#005fb8}
  .page-btn{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:1px solid #d1d1d6;border-radius:5px;font-size:14px;color:#555;cursor:pointer;background:#fff;user-select:none}
  .page-btn:hover{border-color:#005fb8;color:#005fb8}
  .page-dot{padding:0 2px;color:#999;font-size:12px}

  .cover-card{cursor:pointer;position:relative;border-radius:7px;overflow:hidden}

  .cover-hover .ch-meta{font-size:12px;color:rgba(255,255,255,0.78);line-height:1.5}
  .cover-title{font-size:13px;color:#333;margin-top:6px;text-align:center;line-height:1.3;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

  .detail{padding:20px 36px 36px}
  .detail-back{display:inline-flex;align-items:center;gap:4px;font-size:14px;color:#005fb8;cursor:pointer;margin-bottom:20px;padding:4px 10px;border-radius:5px}

  .detail-layout{display:flex;gap:36px}
  .detail-left{flex-shrink:0;width:300px}
  .detail-cover{width:300px;height:400px;background:#e8e8e8;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:48px;color:#bbb;overflow:hidden}
  .detail-right{flex:1;min-width:0}
  .detail-title{font-size:24px;font-weight:600;color:#1d1d1f;margin-bottom:4px}
  .detail-date{font-size:14px;color:#999;margin-bottom:2px}
  .detail-studio{font-size:14px;color:#666;margin-bottom:16px}
  .detail-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;align-items:center}
  .detail-tag{padding:3px 10px;background:#e8e8ea;border-radius:5px;font-size:12px;color:#555}
  .detail-section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;width:100%}
  .detail-desc{font-size:13px;color:#666;line-height:1.7;margin-bottom:24px;padding:12px 14px;background:#f2f2f2;border-radius:6px}
  .episodes-title{font-size:14px;font-weight:600;color:#1d1d1f;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #e0e0e0}

  .settings-group{margin-bottom:20px}
  .settings-label{font-size:12px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:6px}

</style>
</head>
<body>
<div class="window">
  <div class="page active" id="page-home">
    <div class="home">
      <div class="search-row">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="搜索标题、简介、制作商" id="searchInput" oninput="applyFilter()">

        </div>
        <div class="header-actions">

        </div>
      </div>
      <div class="filter-row" id="filterRow">
        <button class="filter-btn" data-filter="year">年份 <span class="arrow">▼</span></button>
        <button class="filter-btn" data-filter="studio">制作商 <span class="arrow">▼</span></button>
        <span style="width:1px;height:24px;background:#e0e0e0;margin:auto 4px"></span>
        <button class="filter-btn" data-filter="story">剧情 <span class="arrow">▼</span></button>
        <button class="filter-btn" data-filter="attr">属性 <span class="arrow">▼</span></button>
        <button class="filter-btn" data-filter="scene">场景 <span class="arrow">▼</span></button>
        <span style="width:1px;height:24px;background:#e0e0e0;margin:auto 4px"></span>
        <button class="filter-btn" id="sortTimeBtn" data-sort="time-desc">时间 ⬇</button>
        <button class="filter-btn" id="sortNameBtn" data-sort="name-asc">名称 ⬆</button>
      </div>
      <div class="cover-grid" id="coverGrid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <div class="page" id="page-detail">
    <div class="detail">
      <div class="detail-back" onclick="showHome()">← 返回作品库</div>
      <div class="detail-layout">
        <div class="detail-left">
          <div class="detail-cover" id="detailCover">🎥</div>
        </div>

          <div class="detail-date" id="detailDate"></div>
          <div class="detail-studio" id="detailStudio"></div>
          <div class="detail-tags" id="detailTags"></div>
          <div class="detail-desc" id="detailDesc"></div>
          <div class="episodes-title">集数列表</div>
          <div class="episode-list" id="episodeList"></div>
          <div class="detail-actions">
            <button class="btn-secondary" onclick="alert('打开文件夹')">📂 打开文件夹</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="page" id="page-settings">
    <div class="settings">
      <div class="detail-back" onclick="showPage('page-home')">← 返回</div>
      <div class="settings-title">路径管理</div>
      <div class="settings-group">
        <div class="settings-label">媒体目录</div>
        <div class="settings-field">
          <input class="s-input" type="text" value="D:\HAnime" readonly>
          <button class="btn-secondary">选择</button>
          <button class="btn-secondary">同步</button>
        </div>
      </div>
      <div class="settings-divider"></div>
      <div class="settings-group">
        <div class="settings-label">数据库</div>
        <div class="settings-field">
          <button class="btn-secondary">备份</button>
          <button class="btn-secondary">恢复</button>
        </div>
      </div>
    </div>
  </div>
</div>

    episodes:[{num:1,sub:'援交日記',cover:'cover_ep1.png',story:['援交'],attr:['不良少女','风俗娘','JK','丝袜','碧池','痴女','巨乳'],scene:['阿嘿颜','肉便器','调教','自慰','胃凸','内射']},{num:2,sub:'パコパコ日記',cover:'cover_ep2.png',story:['恋爱喜剧','公众场合','近亲','后宫'],attr:['JK','不良少女','姐妹丼','碧池','白虎','痴女','御姐','巨乳','姐','青梅竹马'],scene:['3P','颜射','内射','乳交']}]}];

  var CAT_KEYS={year:'年份',story:'剧情',char:'人物',attr:'属性',studio:'制作'};

  function showPage(id){document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active')});document.getElementById(id).classList.add('active')}
  function showHome(){showPage('page-home')}

  function imgPath(w){return BASE+'/'+w.folder+'/data/'+w.cover}
  function epImgPath(w,e){return BASE+'/'+w.folder+'/data/'+e.cover}

  function getUniqueTags(){
    var all={story:{},char:{},attr:{}};
    WORKS.forEach(function(w){
      Object.keys(w.characters||{}).forEach(function(k){all.char[w.characters[k]]=1});
      w.episodes.forEach(function(ep){
        (ep.story||[]).forEach(function(t){all.story[t]=1});
        (ep.attr||[]).forEach(function(t){all.attr[t]=1});
      });
    });
    return all;
  }

  function renderGrid(filtered){
    filtered=filtered||WORKS;
    var grid=document.getElementById('coverGrid');
    var count=document.getElementById('resultCount');
    count.textContent=filtered.length+' 个作品';
    if(!filtered.length){grid.innerHTML='<div class="empty-state"><h2>暂无作品</h2><p>路径管理中添加目录后同步</p></div>';return}
    grid.innerHTML=filtered.map(function(w){
      return '<div class="cover-card" onclick="showDetail('+w.id+')"><div class="cover-img">'+
        '<img src="'+imgPath(w)+'" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0" onerror="this.style.display=\'none\'">'+
        '<span style="font-size:36px;color:#bbb;">🎥</span>'+
        '<div class="cover-hover"><div class="ch-title">'+w.title+'</div><div class="ch-meta">'+w.studio+'</div><div class="ch-meta">'+w.episodes.length+'集</div></div></div>'+
        '<div class="cover-title">'+w.title+'</div></div>';
    }).join('');
  }

  function showDetail(id){
    var w=WORKS.find(function(x){return x.id===id});if(!w)return;
    document.getElementById('detailTitle').textContent=w.title;
    document.getElementById('detailDate').textContent=w.yearDesc;
    document.getElementById('detailStudio').textContent=w.studio;
    document.getElementById('detailDesc').textContent=w.desc||'（暂无简介）';
    document.getElementById('detailCover').innerHTML='<img src="'+imgPath(w)+'" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display=\'none\';this.parentNode.innerHTML=\'🎥\'">';
    var html='';
    var chars=w.characters||{};
    if(Object.keys(chars).length>0){html+='<div class="detail-section-title">登场角色</div>';for(var k in chars)html+='<span class="detail-tag">'+chars[k]+'</span>';html+='<div style="width:100%;margin-top:6px"></div>'}
    html+=buildTagSection('剧情',w.episodes,'story');
    html+=buildTagSection('属性',w.episodes,'attr');
    html+=buildTagSection('场景',w.episodes,'scene');
    document.getElementById('detailTags').innerHTML=html;
    document.getElementById('episodeList').innerHTML=w.episodes.map(function(e){
      return '<div class="episode-item"><div class="episode-cover">'+
        '<img src="'+epImgPath(w,e)+'" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0" onerror="this.style.display=\'none\'">🎥</div>'+
        '<div class="episode-info"><div class="episode-num">第'+e.num+'集</div><div class="episode-sub">'+(e.sub||'')+'</div></div>'+
        '<div class="episode-play">▶ 播放</div></div>';
    }).join('');
    showPage('page-detail');
  }

  function buildTagSection(label,episodes,key){
    var all=[];episodes.forEach(function(ep){var a=ep[key]||[];a.forEach(function(t){if(all.indexOf(t)<0)all.push(t)})});
    if(!all.length)return '';
    return '<div class="detail-section-title">'+label+'</div>'+all.map(function(t){return '<span class="detail-tag">'+t+'</span>'}).join('')+'<div style="width:100%;margin-top:6px"></div>';
  }

  // ─── Filter system ───
  var activeFilters={};
  var openDropdown=null;
  var PAGE_SIZE=20;
  var currentPage=1;

  function getFilterOptions(key){
    if(key==='year'){
      var years={};WORKS.forEach(function(w){years[w.year]=1});
      return Object.keys(years).sort().reverse().map(function(y){return{val:y,label:y+'年'}});
    }
    if(key==='studio'){
      var map={};WORKS.forEach(function(w){map[w.studio]=1});
      return Object.keys(map).sort().map(function(s){return{val:s,label:s}});
    }
    if(key==='story'||key==='attr'||key==='scene'){
      var epKey=key;
      var map={};
      WORKS.forEach(function(w){w.episodes.forEach(function(ep){(ep[epKey]||[]).forEach(function(t){map[t]=1})})});
      return Object.keys(map).sort().map(function(t){return{val:t,label:t}});
    }
    return[];
  }

  document.querySelectorAll('.filter-btn[data-filter]').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var key=this.getAttribute('data-filter');
      var existing=document.getElementById('filterDropdown');
      if(existing&&existing.getAttribute('data-key')===key){existing.remove();openDropdown=null;return;}
      if(existing)existing.remove();
      var dd=document.createElement('div');
      dd.id='filterDropdown';
      dd.setAttribute('data-key',key);
      var isVertical=(key==='year'||key==='studio');
      dd.style.cssText=(isVertical?'width:180px;':'min-width:260px;max-width:480px;')+'max-height:320px;overflow-y:auto;background:#fff;border:1px solid #d1d1d6;border-radius:7px;box-shadow:0 8px 24px rgba(0,0,0,0.10);padding:8px 0;z-index:9999;position:fixed';
      var btnRect=this.getBoundingClientRect();
      dd.style.left=(btnRect.left+btnRect.width/2)+'px';
      dd.style.transform='translateX(-50%)';
      dd.style.top=(btnRect.bottom+2)+'px';
      // Boundary check
      setTimeout(function(){if(dd.parentNode){var dr=dd.getBoundingClientRect();if(dr.left<4){dd.style.transform='none';dd.style.left='4px'}if(dr.right>document.documentElement.clientWidth-4){dd.style.transform='none';dd.style.left='auto';dd.style.right='4px'}}},0);
      var options=getFilterOptions(key);
      var isMany=options.length>8;
      var isVertical=(key==='year'||key==='studio');
      var html='<div style="padding:0 14px 6px;border-bottom:1px solid #e0e0e0;margin-bottom:4px"><span style="font-size:11px;font-weight:600;color:#888">'+getCatName(key)+'</span></div>';
      html+='<div style="padding:4px 10px 0;display:flex;flex-direction:'+(isVertical?'column':'row')+';flex-wrap:'+(isVertical?'nowrap':'wrap')+';gap:4px">';
      options.forEach(function(o){
        var sel=activeFilters[key]&&activeFilters[key][o.val];
        html+='<span class="filter-dd-item'+(sel?' selected':'')+'" data-val="'+String(o.val).replace(/"/g,'&quot;')+'" onclick="toggleFilter(\''+key+'\',this)" style="display:'+(isVertical?'block':'inline-block')+';padding:3px 10px;border:1px solid '+(sel?'#005fb8':'#d1d1d6')+';border-radius:5px;font-size:12px;cursor:pointer;background:'+(sel?'#005fb8':'#fff')+';color:'+(sel?'#fff':'#444')+';'+(isVertical?'margin:1px 0':'')+'">'+o.label+'</span>';
      });
      html+='</div>';
      html+='<div style="border-top:1px solid #e0e0e0;margin-top:6px;padding:6px 14px 4px;display:flex;gap:12px">'+
        '<span onclick="clearFilter(\''+key+'\')" style="cursor:pointer;font-size:12px;color:#999">清除</span>'+
        '<span onclick="closeDropdown()" style="cursor:pointer;font-size:12px;color:#005fb8;margin-left:auto">确定</span></div>';
      dd.innerHTML=html;
      document.body.appendChild(dd);
      openDropdown=dd;
    });
  });

  document.addEventListener('click',function(e){if(openDropdown&&!openDropdown.contains(e.target)&&!e.target.closest('.filter-btn')){openDropdown.remove();openDropdown=null}});

  function closeDropdown(){if(openDropdown){openDropdown.remove();openDropdown=null}}

  function getCatName(k){return{year:'年份',story:'剧情',attr:'属性',scene:'场景',studio:'制作商'}[k]||k}

  function toggleFilter(key,el){
    el.classList.toggle('selected');
    var val=el.getAttribute('data-val');
    if(!activeFilters[key])activeFilters[key]={};
    if(el.classList.contains('selected')){activeFilters[key][val]=true;el.style.borderColor='#005fb8';el.style.background='#005fb8';el.style.color='#fff'}
    else{delete activeFilters[key][val];el.style.borderColor='#d1d1d6';el.style.background='#fff';el.style.color='#444'}
    applyFilter();
  }

  function clearFilter(key){
    delete activeFilters[key];
    closeDropdown();
    currentPage=1;
    applyFilter();
  }

  // ─── Sort ───
  var currentSort='time-desc';
  document.getElementById('sortTimeBtn').addEventListener('click',function(){
    currentSort=(currentSort==='time-desc')?'time-asc':'time-desc';
    this.innerHTML='时间 '+(currentSort==='time-desc'?'⬇':'⬆');
    currentPage=1;applyFilter();
  });
  document.getElementById('sortNameBtn').addEventListener('click',function(){
    currentSort=(currentSort==='name-asc')?'name-desc':'name-asc';
    this.innerHTML='名称 '+(currentSort==='name-asc'?'⬆':'⬇');
    currentPage=1;applyFilter();
  });

  // ─── Apply filter + sort + paginate ───
  function applyFilter(){
    var results=WORKS.slice();
    for(var key in activeFilters){
      var vals=Object.keys(activeFilters[key]);
      if(vals.length===0)continue;
      results=results.filter(function(w){
        if(key==='year')return vals.some(function(v){return String(w.year)===v});
        if(key==='studio')return vals.indexOf(w.studio)>=0;
        var epKey=key;
        return w.episodes.some(function(ep){var tags=ep[epKey]||[];return vals.some(function(v){return tags.indexOf(v)>=0})});
      });
    }
    // Search
    var kw=document.getElementById('searchInput').value.trim().toLowerCase();
    if(kw)results=results.filter(function(w){return w.title.toLowerCase().indexOf(kw)>=0||w.desc.toLowerCase().indexOf(kw)>=0});
    // Sort
    if(currentSort==='time-desc')results.sort(function(a,b){return b.year-a.year||(b.yearDesc<b.yearDesc?-1:1)});
    else if(currentSort==='time-asc')results.sort(function(a,b){return a.year-b.year||(a.yearDesc<b.yearDesc?-1:1)});
    else if(currentSort==='name-asc')results.sort(function(a,b){return a.title.localeCompare(b.title)});
    else if(currentSort==='name-desc')results.sort(function(a,b){return b.title.localeCompare(a.title)});
    // Paginate
    var total=results.length;
    var totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
    if(currentPage>totalPages)currentPage=totalPages;
    var start=(currentPage-1)*PAGE_SIZE;
    var pageItems=results.slice(start,start+PAGE_SIZE);
    renderGrid(pageItems,total,totalPages);
    // Update active filter buttons
    document.querySelectorAll('.filter-btn[data-filter]').forEach(function(b){
      var k=b.getAttribute('data-filter');
      b.classList.toggle('active',activeFilters[k]?Object.keys(activeFilters[k]).length>0:false);
    });
  }

  function renderGrid(items,total,totalPages){
    var grid=document.getElementById('coverGrid');
    var count=document.getElementById('resultCount');
    count.textContent=(total||items.length)+' 个作品';
    if(!items.length){grid.innerHTML='<div class="empty-state"><h2>暂无作品</h2><p>路径管理中添加目录后同步</p></div>';return}
    grid.innerHTML=items.map(function(w){
      return '<div class="cover-card" onclick="showDetail('+w.id+')"><div class="cover-img">'+
        '<img src="'+imgPath(w)+'" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0" onerror="this.style.display=\'none\'">'+
        '<span style="font-size:36px;color:#bbb;">🎥</span>'+
        '<div class="cover-hover"><div class="ch-title">'+w.title+'</div><div class="ch-meta">'+w.studio+'</div><div class="ch-meta">'+w.episodes.length+'集</div></div></div>'+
        '<div class="cover-title">'+w.title+'</div></div>';
    }).join('');
    // Pagination
    renderPagination(total,totalPages);
  }

  function renderPagination(total,totalPages){
    var pag=document.getElementById('pagination');
    if(!pag)return;
    if(!total)total=WORKS.length;
    totalPages=Math.max(1,Math.ceil(total/PAGE_SIZE));
    var h='<span class="page-btn" onclick="goPage('+(currentPage-1)+')" style="'+(currentPage<=1?'opacity:0.3;pointer-events:none':'')+'">‹</span>';
    for(var i=1;i<=totalPages;i++){
      if(i===currentPage)h+='<span class="page-num active">'+i+'</span>';
      else if(i===1||i===totalPages||Math.abs(i-currentPage)<=2)h+='<span class="page-num" onclick="goPage('+i+')">'+i+'</span>';
      else if(h.indexOf('...')<0)h+='<span class="page-dot">...</span>';
    }
    h+='<span class="page-btn" onclick="goPage('+(currentPage+1)+')" style="'+(currentPage>=totalPages?'opacity:0.3;pointer-events:none':'')+'">›</span>';
    h+='<input type="number" id="pageJump" value="'+currentPage+'" min="1" max="'+totalPages+'" onkeydown="if(event.key==\'Enter\')jumpToPage()" style="width:48px;height:28px;border:1px solid #d1d1d6;border-radius:5px;font-size:12px;text-align:center;margin:0 4px">';
    h+='<span style="font-size:12px;color:#999">共 '+total+' 部</span>';
    pag.innerHTML=h;
  }

  function goPage(p){currentPage=p;applyFilter()}
  function jumpToPage(){var inp=document.getElementById('pageJump');if(!inp)return;var p=parseInt(inp.value);if(p>=1)goPage(p)}

  // Search input
  document.getElementById('searchInput').addEventListener('input',applyFilter);

  // Initial render
  applyFilter();
</script>
</body>
</html>
